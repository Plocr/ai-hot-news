# AI 热点资讯 RSS 源配置
# column: company → 中栏公司卡片 | media → 右栏媒体混排
# 每天 06:00 / 12:00 (CST) 抓取

feeds:
  # --- AI 公司官方 (→ 中栏) ---
  - id: openai
    name: OpenAI
    url: https://openai.com/news/rss.xml
    category: company
    column: company
    max_items: 20
    enabled: true

  # --- 科技媒体 AI 板块 (→ 右栏) ---
  - id: techcrunch
    name: TechCrunch AI
    url: https://techcrunch.com/category/artificial-intelligence/feed/
    category: industry
    column: media
    max_items: 30
    enabled: true

  - id: venturebeat
    name: VentureBeat AI
    url: https://venturebeat.com/category/ai/feed/
    category: industry
    column: media
    max_items: 30
    enabled: true

  - id: theverge
    name: The Verge AI
    url: https://www.theverge.com/rss/ai-artificial-intelligence/index.xml
    category: industry
    column: media
    max_items: 30
    enabled: true

  - id: arstechnica
    name: Ars Technica AI
    url: https://arstechnica.com/ai/feed/
    category: industry
    column: media
    max_items: 30
    enabled: true

  - id: marktechpost
    name: MarkTechPost
    url: https://www.marktechpost.com/feed/
    category: industry
    column: media
    max_items: 15
    enabled: true

  # --- 社区热点 (→ 右栏) ---
  - id: hackernews
    name: Hacker News
    url: https://hnrss.org/frontpage
    category: community
    column: media
    max_items: 30
    enabled: true

  # --- 前沿研究 (→ 右栏) ---
  - id: arxiv
    name: arXiv cs.AI
    url: https://arxiv.org/rss/cs.AI
    category: research
    column: media
    max_items: 30
    enabled: true

  # --- 精选博客 (→ 右栏) ---
  - id: simonw
    name: Simon Willison
    url: https://simonwillison.net/atom/everything/
    category: opinion
    column: media
    max_items: 20
    enabled: true

  - id: lilianweng
    name: Lilian Weng
    url: https://lilianweng.github.io/index.xml
    category: opinion
    column: media
    max_items: 10
    enabled: true

  - id: importai
    name: Import AI
    url: https://importai.substack.com/feed
    category: opinion
    column: media
    max_items: 10
    enabled: true

  - id: interconnects
    name: Interconnects
    url: https://www.interconnects.ai/feed
    category: opinion
    column: media
    max_items: 10
    enabled: true

  # --- 国内科技媒体 (→ 右栏，覆盖国内AI公司) ---
  - id: kr36
    name: 36氪
    url: https://36kr.com/feed
    category: industry
    column: media
    max_items: 30
    enabled: true
